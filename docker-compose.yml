services:
  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - mlruns:/app/mlruns
    depends_on:
      - mlflow
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    command: mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns --allowed-hosts all
    ports:
      - "5000:5000"
    volumes:
      - mlruns:/mlruns
    restart: unless-stopped

volumes:
  mlruns:
