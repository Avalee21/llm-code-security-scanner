services:
  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - mlruns:/app/mlruns
    depends_on:
      - mlflow
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns --no-serve-artifacts
    expose:
      - "5000"
    volumes:
      - mlruns:/mlruns
    restart: unless-stopped

  mlflow-proxy:
    image: nginx:alpine
    ports:
      - "5000:80"
    depends_on:
      - mlflow
    restart: unless-stopped
    volumes:
      - ./infra/nginx-mlflow.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mlruns:
